service: taller-users
frameworkVersion: "4"

custom:
  usersTableName: ${self:service}-${self:provider.stage}-users
  refreshTokensTableName: ${self:service}-${self:provider.stage}-refresh-tokens

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'local'}
  region: us-east-1
  environment:
    STAGE: ${self:provider.stage}
    JWT_SECRET: ${ssm:/taller/${self:provider.stage}/jwt-secret, 'local-dev-secret'}
    JWT_REFRESH_SECRET: ${ssm:/taller/${self:provider.stage}/jwt-refresh-secret, 'local-dev-refresh-secret'}
    CORS_ORIGIN: ${file(./config/config-${self:provider.stage}.json):CORS_ORIGIN}
    USERS_TABLE: ${self:custom.usersTableName}
    REFRESH_TOKEN_TABLE: ${self:custom.refreshTokensTableName}
    

  apiGateway:
    restApiId: ${cf:taller-gateway-${self:provider.stage}.MainRestApiId}
    restApiRootResourceId: ${cf:taller-gateway-${self:provider.stage}.MainRestApiRootResourceId}
      
  iamRoleStatements:
    - Effect: Allow
      Action:
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
      Resource: "*"
    - Effect: Allow
      Action: 
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
        - dynamodb:Query
      Resource:
        - Fn::GetAtt: [UsersTable, Arn]
        - Fn::Join:
            - "/"
            - - Fn::GetAtt: [UsersTable, Arn]
              - "index/*"
        - Fn::GetAtt: [RefreshTokensTable, Arn]

functions:
  register: 
    handler: src/handlers/register.register
    name: taller-${self:provider.stage}-Users-Register
    events:
      - http:
          method: post
          path: /users/register
          cors:
            origin: "*"
            headers: 
                - Content-Type
                - Authorization
                - X-Api-Key
                - X-Amz-Date
                - X-Amz-Security-Token

  login:
    handler: src/handlers/login.login
    events:
      - http:
          method: post
          path: /users/login
          cors:
            origin: "*"
            headers: 
                - Content-Type
                - Authorization
                - X-Api-Key
                - X-Amz-Date
                - X-Amz-Security-Token

  getUser:
    handler: src/handlers/getUser.getUser
    events:
      - http:
          method: get
          path: /users/{id}
          cors:
            origin: "*"
            headers: 
                - Content-Type
                - Authorization
                - X-Api-Key
                - X-Amz-Date
                - X-Amz-Security-Token
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:taller-gateway-${self:provider.stage}.MainAuthorizerId}

  updateUser:
    handler: src/handlers/updateUser.updateUser
    events:
      - http:
          method: put
          path: /users/{id}
          cors:
            origin: "*"
            headers: 
                - Content-Type
                - Authorization
                - X-Api-Key
                - X-Amz-Date
                - X-Amz-Security-Token
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:taller-gateway-${self:provider.stage}.MainAuthorizerId}

  deleteUser:
    handler: src/handlers/deleteUser.deleteUser
    events:
      - http:
          method: delete
          path: /users/{id}
          cors:
            origin: "*"
            headers: 
                - Content-Type
                - Authorization
                - X-Api-Key
                - X-Amz-Date
                - X-Amz-Security-Token
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:taller-gateway-${self:provider.stage}.MainAuthorizerId}


resources: 
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.usersTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        
        KeySchema: 
          - AttributeName: userId
            KeyType: HASH
        
        GlobalSecondaryIndexes:
          - IndexName: EmailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
              
    RefreshTokensTable: 
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-refresh-tokens
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: token
            AttributeType: S

        KeySchema: 
          - AttributeName: token
            KeyType: HASH
        # Tiempo de vida del token
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
      


        
    

